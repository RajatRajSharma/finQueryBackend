# Local dev stack: Qdrant (vector DB) + the FastAPI backend.
#   docker compose up --build
# API:    http://localhost:8000/docs
# Qdrant: http://localhost:6333/dashboard
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST + dashboard
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  backend:
    build: .
    ports:
      - "8000:8000"
    # Pulls GEMINI_API_KEY, model names, chunking knobs, etc. from your .env.
    env_file:
      - .env
    # Inside the compose network the backend reaches Qdrant by service name,
    # so override the localhost default from .env.
    environment:
      QDRANT_URL: http://qdrant:6333
    # Persist uploaded PDFs on the host (data/raw is where /upload saves them).
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_storage:
